<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Bubble VR - Matemática Interativa</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

    <style>
        body {
            background: radial-gradient(circle at center, #1e1b4b 0%, #020617 100%);
            font-family: 'Rajdhani', sans-serif;
            color: white; overflow: hidden; height: 100vh; margin: 0;
        }
        .title-font { font-family: 'Orbitron', sans-serif; }
        
        /* Fundo Animado */
        .float-symbol {
            position: absolute; color: rgba(99, 102, 241, 0.2); font-weight: bold;
            pointer-events: none; animation: floatUp 10s infinite linear; z-index: 0;
        }
        @keyframes floatUp {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        /* Bolhas */
        .bubble {
            position: absolute; width: 120px; height: 120px; border-radius: 50%;
            background: rgba(15, 23, 42, 0.95);
            border: 4px solid #38bdf8;
            display: flex; align-items: center; justify-content: center;
            font-size: 3.5rem; font-weight: 900; color: #ffffff;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.8);
            box-shadow: 0 0 25px rgba(56, 189, 248, 0.6);
            pointer-events: none; z-index: 50; transition: transform 0.2s, opacity 0.2s, background-color 0.2s;
        }

        .bubble.popped {
            transform: scale(1.6);
            opacity: 0;
            border-color: #4ade80;
            box-shadow: 0 0 40px #4ade80;
        }

        .bubble.wrong {
            background: rgba(159, 18, 57, 0.95);
            border-color: #f43f5e;
            transform: scale(0.9);
        }

        /* Vídeo e Mira */
        #video-container { position: relative; width: 100%; height: 100vh; display: none; }
        #webcam-view { transform: scaleX(-1); width: 100%; height: 100%; object-fit: cover; }
        
        .pointer-dot {
            position: fixed; 
            width: 35px; height: 35px; background: #fb7185;
            border-radius: 50%; border: 4px solid white; z-index: 100;
            pointer-events: none; box-shadow: 0 0 20px #f43f5e; transform: translate(-50%, -50%);
            display: none;
        }

        /* Telas de Overlay */
        #game-over-screen {
            display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.95);
            z-index: 200; flex-direction: column; align-items: center; justify-content: center;
        }

        #start-overlay {
            display: none; position: absolute; inset: 0; background: rgba(0, 0, 0, 0.85);
            z-index: 150; flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div id="bg-symbols"></div>

    <div id="pointer-1" class="pointer-dot"></div>
    <div id="pointer-2" class="pointer-dot"></div>

    <main id="home-screen" class="relative z-10 flex flex-col items-center justify-center h-full text-center">
        <h1 class="title-font text-6xl font-bold mb-4 text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-cyan-400">MATH BUBBLE</h1>
        <p class="text-xl mb-12 text-indigo-200 tracking-[0.3em]">MATEMÁTICA INTERATIVA</p>
        
        <input type="text" id="player-name" placeholder="Seu Nome" autocomplete="off" 
               class="bg-white/10 border-2 border-indigo-500 rounded-2xl px-6 py-4 mb-6 text-2xl outline-none focus:bg-white/20 transition-all w-80 text-center">
        
        <button onclick="irParaSelecao()" class="px-12 py-5 bg-indigo-600 hover:bg-indigo-500 rounded-2xl font-bold text-2xl shadow-lg shadow-indigo-500/40 transition-all uppercase">
            Entrar
        </button>
    </main>

    <section id="selection-screen" class="hidden flex flex-col items-center justify-center h-full p-6 text-center z-10 relative">
        <h2 class="title-font text-4xl mb-10 text-cyan-300">QUAL OPERAÇÃO?</h2>
        <div class="grid grid-cols-2 gap-6 w-full max-w-4xl">
            <button onclick="irParaDificuldade('+')" class="bg-emerald-900/60 p-12 rounded-3xl border-2 border-emerald-500 hover:bg-emerald-800 transition-all text-2xl font-bold">➕ ADIÇÃO</button>
            <button onclick="irParaDificuldade('-')" class="bg-rose-900/60 p-12 rounded-3xl border-2 border-rose-500 hover:bg-rose-800 transition-all text-2xl font-bold">➖ SUBTRAÇÃO</button>
            <button onclick="irParaDificuldade('*')" class="bg-amber-900/60 p-12 rounded-3xl border-2 border-amber-500 hover:bg-amber-800 transition-all text-2xl font-bold">✖️ MULTI</button>
            <button onclick="irParaDificuldade('/')" class="bg-cyan-900/60 p-12 rounded-3xl border-2 border-cyan-500 hover:bg-cyan-800 transition-all text-2xl font-bold">➗ DIVISÃO</button>
        </div>
    </section>

    <section id="difficulty-screen" class="hidden flex flex-col items-center justify-center h-full p-6 text-center z-10 relative">
        <h2 class="title-font text-4xl mb-10 text-yellow-300">ESCOLHA O NÍVEL</h2>
        <div class="grid grid-cols-3 gap-6 w-full max-w-4xl">
            <button onclick="prepararJogo('facil')" class="bg-green-900/60 p-10 rounded-3xl border-2 border-green-500 hover:bg-green-800 transition-all flex flex-col items-center">
                <span class="text-3xl font-bold mb-2">FÁCIL 🐢</span>
                <span class="text-sm text-green-200">Acelera devagar</span>
            </button>
            <button onclick="prepararJogo('medio')" class="bg-orange-900/60 p-10 rounded-3xl border-2 border-orange-500 hover:bg-orange-800 transition-all flex flex-col items-center">
                <span class="text-3xl font-bold mb-2">MÉDIO 🐅</span>
                <span class="text-sm text-orange-200">Sobe rápido</span>
            </button>
            <button onclick="prepararJogo('hard')" class="bg-red-900/60 p-10 rounded-3xl border-2 border-red-500 hover:bg-red-800 transition-all flex flex-col items-center">
                <span class="text-3xl font-bold mb-2">HARD 🔥</span>
                <span class="text-sm text-red-200">Acelera a cada 4 seg!</span>
            </button>
        </div>
    </section>

    <div id="video-container">
        <div id="start-overlay">
            <h2 class="title-font text-4xl text-cyan-300 mb-4 text-center">PERMITA O ACESSO À CÂMERA</h2>
            <p class="text-xl text-indigo-200 mb-8 text-center max-w-md">Posicione-se, use as <b>duas mãos</b> e clique no botão abaixo quando estiver pronto para estourar as bolhas!</p>
            <button onclick="iniciarGameplay()" class="px-12 py-5 bg-emerald-600 hover:bg-emerald-500 rounded-2xl font-bold text-3xl shadow-lg shadow-emerald-500/40 transition-all uppercase animate-pulse">
                Começar Jogo!
            </button>
        </div>

        <div class="absolute top-12 sm:top-8 left-0 w-full px-6 pb-6 pt-10 flex justify-between items-center z-[60]">
            <div class="bg-black/80 p-5 rounded-2xl border border-white/20">
                <p class="text-2xl">PONTOS: <span id="score" class="text-yellow-400 font-bold">0</span></p>
            </div>
            <div id="question-box" class="bg-indigo-700 px-12 py-6 rounded-3xl shadow-2xl border-4 border-white text-6xl font-bold title-font">?</div>
            <div class="w-24"></div> 
        </div>
        
        <video id="webcam-view" autoplay playsinline></video>
        <div id="bubbles-area"></div>
    </div>

    <div id="game-over-screen">
        <h2 class="title-font text-7xl text-rose-500 mb-4">GAME OVER</h2>
        <p class="text-8xl font-bold text-yellow-400 mb-8" id="final-score">0</p>
        
        <div class="w-full max-w-md bg-white/5 p-6 rounded-3xl border border-white/10 mb-8">
            <h3 class="title-font text-cyan-400 text-center mb-4 border-b border-cyan-400/20 pb-2">RANKING (TOP 5)</h3>
            <div id="ranking-list" class="space-y-2">
                <p class="text-center opacity-50 italic">Carregando ranking...</p>
            </div>
        </div>
        
        <button onclick="location.reload()" class="px-10 py-4 bg-indigo-600 hover:bg-indigo-500 rounded-xl font-bold text-xl uppercase">Jogar Novamente</button>
    </div>

    <script>
        // ======= FIREBASE SETUP =======
        const firebaseConfig = {
            apiKey: "AIzaSyCo98AZSav7hzbSb-l7jZ9cZbk2dGKQ07c",
            authDomain: "mathbubble-4b497.firebaseapp.com",
            databaseURL: "https://mathbubble-4b497-default-rtdb.firebaseio.com",
            projectId: "mathbubble-4b497",
            storageBucket: "mathbubble-4b497.firebaseestorage.app",
            messagingSenderId: "228365496078",
            appId: "1:228365496078:web:aa2a5001e454a26082b15f"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // ======= SISTEMA DE ÁUDIO =======
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function tocarSom(tipo) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            if (tipo === 'acerto') {
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.1);
            } else if (tipo === 'erro') {
                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(300, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.2);
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.2);
            }
        }

        // ======= EFEITO DE FUNDO =======
        const bgSymbols = document.getElementById('bg-symbols');
        for(let i=0; i<15; i++) {
            let el = document.createElement('div');
            el.className = 'float-symbol text-4xl';
            el.innerText = ['+', '-', '×', '÷'][Math.floor(Math.random()*4)];
            el.style.left = Math.random() * 100 + 'vw';
            el.style.animationDuration = (Math.random() * 5 + 7) + 's';
            bgSymbols.appendChild(el);
        }

        // ======= VARIÁVEIS DE JOGO =======
        let playerName = "", score = 0, currentResult = 0, currentOpType = '+';
        let gameActive = false, velocidadeBase = 0.4, aceleracao = 0.04;
        let nivelDificuldade = 'facil';
        let hardModeInterval = null; 
        
        const pointer1 = document.getElementById('pointer-1');
        const pointer2 = document.getElementById('pointer-2');
        const pointers = [pointer1, pointer2];

        // ======= NAVEGAÇÃO =======
        function irParaSelecao() {
            playerName = document.getElementById('player-name').value || "Explorador";
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('selection-screen').classList.remove('hidden');
        }

        function irParaDificuldade(op) {
            currentOpType = op;
            document.getElementById('selection-screen').classList.add('hidden');
            document.getElementById('difficulty-screen').classList.remove('hidden');
        }

        function prepararJogo(nivel) {
            nivelDificuldade = nivel;
            document.getElementById('difficulty-screen').classList.add('hidden');
            document.getElementById('video-container').style.display = 'block';
            document.getElementById('start-overlay').style.display = 'flex'; 
            
            if (nivel === 'facil') {
                velocidadeBase = 0.25;
                aceleracao = 0.02; 
            } else if (nivel === 'medio') {
                velocidadeBase = 0.45;
                aceleracao = 0.06; 
            } else if (nivel === 'hard') {
                velocidadeBase = 0.7; 
                aceleracao = 0; 
            }

            gameActive = false; 
            setupCamera(); 
        }

        function iniciarGameplay() {
            // Inicializa o áudio na primeira interação do usuário para evitar bloqueio do navegador
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            document.getElementById('start-overlay').style.display = 'none';
            gameActive = true;
            proximaPergunta();

            if (nivelDificuldade === 'hard') {
                hardModeInterval = setInterval(() => {
                    if(gameActive) velocidadeBase += 0.15; 
                }, 4000);
            }
        }

        // ======= LÓGICA MATEMÁTICA =======
        function proximaPergunta() {
            let n1 = Math.floor(Math.random() * 10) + 1;
            let n2 = Math.floor(Math.random() * 10) + 1;
            
            if (currentOpType === '+') currentResult = n1 + n2;
            else if (currentOpType === '-') { 
                if(n1 < n2) [n1, n2] = [n2, n1]; 
                currentResult = n1 - n2; 
            }
            else if (currentOpType === '*') currentResult = n1 * n2;
            else if (currentOpType === '/') { 
                currentResult = n1; 
                n1 = n1 * n2; 
            }

            const sinal = currentOpType === '*' ? '×' : currentOpType === '/' ? '÷' : currentOpType;
            document.getElementById('question-box').innerText = `${n1} ${sinal} ${n2}`;
            gerarBolhas();
        }

        // ======= ANIMAÇÃO E BOLHAS =======
        function gerarBolhas() {
            if (!gameActive) return;
            const area = document.getElementById('bubbles-area');
            area.innerHTML = ''; 
            
            let vals = [currentResult, currentResult + 2, currentResult - 1, Math.floor(Math.random()*30)]
                .sort(() => Math.random() - 0.5);

            vals.forEach((val, i) => {
                const b = document.createElement('div');
                b.className = 'bubble';
                b.innerText = val;
                b.style.left = (12 + i * 24) + '%'; 
                b.style.top = '100%';
                b.dataset.popped = "false";
                area.appendChild(b);
                
                let pos = 100;
                
                function animarBolha() {
                    if (!gameActive) return;
                    pos -= velocidadeBase;
                    b.style.top = pos + '%';
                    
                    if (pos <= 0) {
                        gameActive = false;
                        triggerGameOver();
                    } else if (b.dataset.popped === "false") {
                        b.animationFrameId = requestAnimationFrame(animarBolha);
                    }
                }
                b.animationFrameId = requestAnimationFrame(animarBolha);
            });
        }

        // ======= CÂMERA E DETECÇÃO =======
        function setupCamera() {
            const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
            hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.70 });
            
            hands.onResults(res => {
                pointer1.style.display = 'none';
                pointer2.style.display = 'none';

                if (res.multiHandLandmarks && res.multiHandLandmarks.length > 0) {
                    
                    let handsData = res.multiHandLandmarks.map((landmarks) => {
                        let wrist = landmarks[0]; 
                        let middleFingerBase = landmarks[9]; 
                        let size = Math.sqrt(Math.pow(wrist.x - middleFingerBase.x, 2) + Math.pow(wrist.y - middleFingerBase.y, 2));
                        return { landmarks, size };
                    });

                    handsData.sort((a, b) => b.size - a.size);
                    let mainHands = handsData.slice(0, 2);

                    mainHands.forEach((handData, index) => {
                        if (handData.size < 0.04) return; 
                        
                        const pt = handData.landmarks[8];
                        
                        const x = (1 - pt.x) * window.innerWidth;
                        const y = pt.y * window.innerHeight;
                        
                        pointers[index].style.left = x + 'px';
                        pointers[index].style.top = y + 'px';
                        pointers[index].style.display = 'block';

                        if(gameActive) {
                            document.querySelectorAll('.bubble').forEach(b => {
                                if (b.dataset.popped === "true") return;

                                const r = b.getBoundingClientRect();
                                if (x > r.left && x < r.right && y > r.top && y < r.bottom) {
                                    
                                    if (parseInt(b.innerText) === currentResult) {
                                        b.dataset.popped = "true";
                                        b.classList.add('popped');
                                        cancelAnimationFrame(b.animationFrameId);
                                        
                                        tocarSom('acerto'); 
                                        
                                        score += 10; 
                                        if (nivelDificuldade !== 'hard') velocidadeBase += aceleracao;
                                        document.getElementById('score').innerText = score;
                                        
                                        document.querySelectorAll('.bubble').forEach(ob => cancelAnimationFrame(ob.animationFrameId));
                                        
                                        setTimeout(() => proximaPergunta(), 250);

                                    } else {
                                        if (!b.classList.contains('wrong')) {
                                            b.classList.add('wrong');
                                            tocarSom('erro'); 
                                            
                                            score = Math.max(0, score - 2);
                                            document.getElementById('score').innerText = score;
                                            
                                            setTimeout(() => b.classList.remove('wrong'), 500);
                                        }
                                    }
                                }
                            });
                        }
                    });
                }
            });
            
            const cam = new Camera(document.getElementById('webcam-view'), {
                onFrame: async () => { await hands.send({image: document.getElementById('webcam-view')}); },
                width: 1280, height: 720
            });
            cam.start();
        }

        // ======= FIM DE JOGO =======
        function triggerGameOver() {
            if (hardModeInterval) clearInterval(hardModeInterval); 
            
            pointer1.style.display = 'none';
            pointer2.style.display = 'none';

            document.getElementById('final-score').innerText = score;
            document.getElementById('game-over-screen').style.display = 'flex';
            
            database.ref('ranking').push({ nome: playerName, pontos: score, data: Date.now() });
            
            database.ref('ranking').orderByChild('pontos').limitToLast(5).on('value', snap => {
                const list = document.getElementById('ranking-list');
                list.innerHTML = '';
                let ranks = [];
                snap.forEach(s => ranks.push(s.val()));
                
                ranks.reverse().forEach((r, idx) => {
                    list.innerHTML += `
                    <div class="flex justify-between py-1 border-b border-white/5">
                        <span>${idx+1}. ${r.nome}</span><span class="text-yellow-400 font-bold">${r.pontos}</span>
                    </div>`;
                });
            });
        }
    </script>
</body>
</html>
